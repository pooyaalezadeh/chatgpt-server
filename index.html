// پیام
function add(text,type){
document.getElementById("chat").innerHTML +=
`<div class="msg ${type}">${text}</div>`;
}

function scroll(){
document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight;
}

// 🔊 صدای فارسی واقعی (اصلاح شده)
function speak(text){

speechSynthesis.cancel();

let msg = new SpeechSynthesisUtterance(text);

let voices = speechSynthesis.getVoices();

// پیدا کردن صدای فارسی
let faVoice = voices.find(v =>
v.lang.includes("fa") ||
v.name.toLowerCase().includes("persian") ||
v.name.toLowerCase().includes("farsi")
);

if(faVoice){
msg.voice = faVoice;
msg.lang = faVoice.lang;
} else {
msg.lang = "fa-IR";
}

msg.rate = 0.95;
msg.pitch = 1;

speechSynthesis.speak(msg);
}

// ارسال پیام
async function send(){

let msg = document.getElementById("msg");
if(!msg.value) return;

add("👤 "+msg.value,"user");

let text = msg.value;
msg.value="";

document.getElementById("typing").innerText="🤖 در حال پردازش...";

let res = await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

let data = await res.json();

document.getElementById("typing").innerText="";

add("🤖 "+data.reply,"bot");

// 🔊 صدا
speak(data.reply);

scroll();
}

// 🎤 میکروفون
function startVoice(){

let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang = "fa-IR";
recognition.start();

recognition.onresult = function(event){
document.getElementById("msg").value =
event.results[0][0].transcript;
};

}
